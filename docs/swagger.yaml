host: localhost:8080
info:
  contact: {}
  description: Backend HRIS dan operasional frozen-food retail dengan JWT auth, geofenced
    attendance + selfie, leave approval with staffing risk, payroll, PPE/asset compliance,
    dan executive reports.
  title: HRIS Monitoring API
  version: "1.0"
paths:
  /api/reports/attendance-risk:
    get:
      description: Executive report showing attendance anomalies, leave load, minimum
        staffing pressure, and computed attendance risk by location.
      parameters:
      - description: Month
        in: query
        name: month
        type: integer
      - description: Year
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AttendanceRiskReportListDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get attendance risk report
      tags:
      - Reports
  /api/reports/labour-cost-leakage:
    get:
      description: Executive report showing attendance-related payroll leakage by
        location, including deductions, lateness, absence counts, and leakage percentage.
      parameters:
      - description: Month
        in: query
        name: month
        type: integer
      - description: Year
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.LabourCostLeakageReportListDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get labour cost leakage report
      tags:
      - Reports
  /assets:
    get:
      description: List operational assets and PPE items including status, condition,
        and borrower linkage.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.AssetResponseDoc'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List assets
      tags:
      - Assets
    post:
      consumes:
      - application/json
      description: Create a new PPE or operational asset record.
      parameters:
      - description: Create asset payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateAssetRequestDoc'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.AssetResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create asset
      tags:
      - Assets
  /assets/{id}:
    delete:
      description: Delete an asset record.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete asset
      tags:
      - Assets
    get:
      description: Retrieve one asset or PPE record by identifier.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AssetResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get asset by ID
      tags:
      - Assets
    put:
      consumes:
      - application/json
      description: Update editable asset fields such as name, category, condition,
        and notes.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update asset payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.UpdateAssetRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AssetResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update asset
      tags:
      - Assets
  /assets/borrow/{id}:
    post:
      consumes:
      - application/json
      description: Assign an available asset to a user.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      - description: Borrow asset payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.BorrowAssetRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AssetResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Borrow asset
      tags:
      - Assets
  /assets/return/{id}:
    post:
      consumes:
      - application/json
      description: Return a borrowed asset and update its latest condition.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: integer
      - description: Return asset payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.ReturnAssetRequestDoc'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AssetResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Return asset
      tags:
      - Assets
  /attendance:
    get:
      description: Return attendance history for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.AttendanceResponseDoc'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List current user's attendances
      tags:
      - Attendance
  /attendance/{id}:
    get:
      description: Retrieve one attendance record. Admin HR and outlet managers may
        access records beyond their own when authorized.
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AttendanceResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get attendance by ID
      tags:
      - Attendance
  /attendance/checkin:
    post:
      consumes:
      - multipart/form-data
      description: Check in with location validation, geofence validation, selfie
        upload, shift-aware lateness, and warehouse PPE compliance.
      parameters:
      - description: Location ID
        in: formData
        name: location_id
        required: true
        type: integer
      - description: Device latitude
        in: formData
        name: latitude
        required: true
        type: number
      - description: Device longitude
        in: formData
        name: longitude
        required: true
        type: number
      - description: Selfie image
        in: formData
        name: selfie
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.AttendanceResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Check in attendance
      tags:
      - Attendance
  /attendance/checkout:
    post:
      description: Close the current open attendance record for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AttendanceResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Check out attendance
      tags:
      - Attendance
  /leaves:
    get:
      description: Return leave history for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.LeaveResponseDoc'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List current user's leaves
      tags:
      - Leaves
    post:
      consumes:
      - multipart/form-data
      description: Submit leave or permit request with optional supporting document
        upload.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: formData
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: formData
        name: end_date
        required: true
        type: string
      - description: Leave type
        in: formData
        name: leave_type
        required: true
        type: string
      - description: Reason
        in: formData
        name: reason
        type: string
      - description: Supporting document
        in: formData
        name: document
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.LeaveResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Apply leave
      tags:
      - Leaves
  /leaves/{id}:
    get:
      description: Retrieve one leave request by identifier.
      parameters:
      - description: Leave ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.LeaveResponseDoc'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get leave by ID
      tags:
